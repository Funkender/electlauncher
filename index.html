<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --accent: #30b27b; --bg: #0a0a0a; --panel: #141414; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:100; }
        .modal-content { background:#1a1a1a; padding:30px; border-radius:12px; border:1px solid #333; width:380px; display:flex; flex-direction:column; gap:15px; }
        .inst-list { flex: 1; overflow-y: auto; margin-top: 20px; }
        .inst-card { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .inst-card.active { border-color: var(--accent); background: #1a251f; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--accent); width: 100%; margin-bottom: 10px; color: white; }
        .folder-btn { background: transparent; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 4px; }
        .play-btn { background: var(--accent); width: 350px; height: 90px; font-size: 26px; border-radius: 15px; color: white; }
        .play-btn:disabled { background: #222; color: #444; }
        input, select { padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        #log { width: 90%; background: black; color: #0f0; font-family: monospace; height: 150px; padding: 10px; font-size: 11px; border: 1px solid #222; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gen-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Neue Instanz erstellen</h3>
            <input type="text" id="new-name" placeholder="Name (z.B. Survival)">
            <label>Version wählen:</label>
            <select id="version-select">
                <option>Lade Versionen...</option>
            </select>
            <div id="gen-status" style="font-size:12px; color:var(--accent)">Bereit.</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#444; flex:1; color:white" onclick="closeModal()">Abbrechen</button>
                <button class="btn btn-add" style="flex:2" onclick="confirmGen()">Erstellen</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h2>Launcher</h2>
        <button class="btn btn-add" onclick="openModal()">+ NEUE INSTANZ</button>
        <div id="instance-list" class="inst-list"></div>
    </div>

    <div class="main">
        <h1 id="current-name">Wähle eine Instanz</h1>
        <button id="play-btn" class="btn play-btn" onclick="toggleGame()" disabled>SPIELEN</button>
        <div id="log">Logs...</div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let selected = null;
        let isRunning = false;

        window.onload = () => {
            ipcRenderer.send('get-instances');
            ipcRenderer.send('get-all-versions'); // Lade die Versionsliste von Mojang
        };

        function openModal() { document.getElementById('gen-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('gen-modal').style.display = 'none'; }

        // VERSIONEN IN DAS DROPDOWN FÜLLEN
        ipcRenderer.on('all-versions-list', (e, versions) => {
            const select = document.getElementById('version-select');
            select.innerHTML = ""; // Platzhalter entfernen
            versions.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.innerText = `Minecraft ${v.id}`;
                select.appendChild(opt);
            });
        });

        function confirmGen() {
            const name = document.getElementById('new-name').value;
            const version = document.getElementById('version-select').value;
            if(!name) return alert("Name eingeben!");
            ipcRenderer.send('run-generator', { name, version });
        }

        ipcRenderer.on('instance-ready', (e, data) => {
            closeModal();
            if (document.getElementById(`inst-${data.name}`)) return;
            const div = document.createElement('div');
            div.className = 'inst-card';
            div.id = `inst-${data.name}`;
            div.innerHTML = `<div><b>${data.name}</b><br><small>${data.version}</small></div><button class="folder-btn" onclick="openFolder(event, '${data.name}')">📂</button>`;
            div.onclick = () => {
                document.querySelectorAll('.inst-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                selected = data;
                document.getElementById('play-btn').disabled = false;
                document.getElementById('current-name').innerText = data.name;
            };
            document.getElementById('instance-list').appendChild(div);
        });

        function openFolder(e, name) { e.stopPropagation(); ipcRenderer.send('open-folder', name); }
        function toggleGame() { ipcRenderer.send('game-action', { action: isRunning ? 'stop' : 'start', name: selected.name, version: selected.version }); }
        ipcRenderer.on('status', (e, d) => { document.getElementById('gen-status').innerText = `${d.msg} (${d.prog}%)`; });
        ipcRenderer.on('game-status', (e, s) => {
            isRunning = (s === 'running');
            const btn = document.getElementById('play-btn');
            btn.innerText = isRunning ? 'STOPPEN' : 'SPIELEN';
            btn.style.background = isRunning ? '#e53935' : '#30b27b';
        });
        ipcRenderer.on('log', (e, m) => { const l = document.getElementById('log'); l.innerText += m; l.scrollTop = l.scrollHeight; });
    </script>
</body>
</html>
